<svg viewBox="0 0 980 570" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F7F8FA"/>
      <stop offset="100%" style="stop-color:#EEF2F7"/>
    </linearGradient>
    <linearGradient id="triggerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#C0392B"/>
      <stop offset="100%" style="stop-color:#96211B"/>
    </linearGradient>
    <linearGradient id="l1Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8A020"/>
      <stop offset="100%" style="stop-color:#C07A10"/>
    </linearGradient>
    <linearGradient id="l2Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1C3148"/>
      <stop offset="100%" style="stop-color:#0D1B2A"/>
    </linearGradient>
    <marker id="arrowRed" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 9 3, 0 6" fill="#C0392B" opacity="0.75"/>
    </marker>
    <marker id="arrowNavy" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 9 3, 0 6" fill="#1C3148"/>
    </marker>
    <filter id="shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#0D1B2A" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="980" height="570" fill="url(#bg)"/>
  <rect width="980" height="4" fill="#E8A020"/>

  <!-- Title -->
  <text x="490" y="36" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="15" font-weight="700" fill="#0D1B2A" text-anchor="middle">HOW ONE STALLED DECISION CASCADES ACROSS AN EPC PROJECT</text>
  <text x="490" y="54" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="10" fill="#718096" text-anchor="middle">Single trigger event · four dependent delays · compounding cost</text>

  <!-- ── ROW 1: Trigger (centred, wide box) ── -->
  <rect x="290" y="72" width="400" height="72" rx="6" fill="url(#triggerGrad)" filter="url(#shadow)"/>
  <rect x="290" y="72" width="400" height="3" rx="3" fill="#FF7070" opacity="0.5"/>
  <text x="490" y="95" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="9.5" font-weight="700" fill="#FFD5D5" text-anchor="middle" letter-spacing="1.5">TRIGGER — STALLED DECISION</text>
  <text x="490" y="114" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13.5" font-weight="700" fill="#FFFFFF" text-anchor="middle">Design Clarification Not Approved</text>
  <text x="490" y="132" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="9.5" fill="#FFB3B3" text-anchor="middle">Stalls for 12 days · $45,662/day burn rate</text>

  <!-- ── Arrows: trigger to L1 boxes ── -->
  <!-- to box 1 centre x=158 -->
  <line x1="360" y1="144" x2="170" y2="208" stroke="#C0392B" stroke-width="1.6" stroke-dasharray="5,3" marker-end="url(#arrowRed)" opacity="0.75"/>
  <!-- to box 2 centre x=378 -->
  <line x1="430" y1="144" x2="378" y2="208" stroke="#C0392B" stroke-width="1.6" stroke-dasharray="5,3" marker-end="url(#arrowRed)" opacity="0.75"/>
  <!-- to box 3 centre x=602 -->
  <line x1="550" y1="144" x2="602" y2="208" stroke="#C0392B" stroke-width="1.6" stroke-dasharray="5,3" marker-end="url(#arrowRed)" opacity="0.75"/>
  <!-- to box 4 centre x=822 -->
  <line x1="620" y1="144" x2="810" y2="208" stroke="#C0392B" stroke-width="1.6" stroke-dasharray="5,3" marker-end="url(#arrowRed)" opacity="0.75"/>

  <!-- ── ROW 2: L1 boxes — box width 196, gap 14 ── -->
  <!-- Box centres at x: 62+98=160, 276+98=374, 490+98=588, 704+98=802 -->

  <!-- Box 1 x=62 -->
  <rect x="62" y="208" width="196" height="78" rx="6" fill="url(#l1Grad)" filter="url(#shadow)"/>
  <text x="160" y="228" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="8" font-weight="700" fill="#FFF3D6" text-anchor="middle" letter-spacing="1">PROCUREMENT BLOCKED</text>
  <text x="160" y="245" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">RFQ Cannot Be Issued</text>
  <text x="160" y="261" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="9" fill="#FFF3D6" text-anchor="middle">Package B procurement stalls</text>
  <text x="160" y="276" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="9" fill="#FFF3D6" text-anchor="middle">Lead-time clock not started</text>

  <!-- Box 2 x=276 -->
  <rect x="276" y="208" width="196" height="78" rx="6" fill="url(#l1Grad)" filter="url(#shadow)"/>
  <text x="374" y="228" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="8" font-weight="700" fill="#FFF3D6" text-anchor="middle" letter-spacing="1">FABRICATION SLOT LOST</text>
  <text x="374" y="245" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">Shop Drawing Frozen</text>
  <text x="374" y="261" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="9" fill="#FFF3D6" text-anchor="middle">Fabricator releases slot</text>
  <text x="374" y="276" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="9" fill="#FFF3D6" text-anchor="middle">to next client · +18-wk queue</text>

  <!-- Box 3 x=490 -->
  <rect x="490" y="208" width="196" height="78" rx="6" fill="url(#l1Grad)" filter="url(#shadow)"/>
  <text x="588" y="228" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="8" font-weight="700" fill="#FFF3D6" text-anchor="middle" letter-spacing="1">CIVIL CREW IDLES</text>
  <text x="588" y="245" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">Foundation Work Stops</text>
  <text x="588" y="261" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="9" fill="#FFF3D6" text-anchor="middle">4 excavators, 28 workers</text>
  <text x="588" y="276" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="9" fill="#FFF3D6" text-anchor="middle">standing by at day rate</text>

  <!-- Box 4 x=704 -->
  <rect x="704" y="208" width="210" height="78" rx="6" fill="url(#l1Grad)" filter="url(#shadow)"/>
  <text x="809" y="228" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="8" font-weight="700" fill="#FFF3D6" text-anchor="middle" letter-spacing="1">SCHEDULE LOGIC BREAKS</text>
  <text x="809" y="245" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">Critical Path Shifts</text>
  <text x="809" y="261" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="9" fill="#FFF3D6" text-anchor="middle">3 successor activities</text>
  <text x="809" y="276" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="9" fill="#FFF3D6" text-anchor="middle">re-sequenced; float consumed</text>

  <!-- ── Arrows: L1 to L2 ── -->
  <line x1="160" y1="286" x2="160" y2="352" stroke="#1C3148" stroke-width="1.5" marker-end="url(#arrowNavy)"/>
  <line x1="374" y1="286" x2="374" y2="352" stroke="#1C3148" stroke-width="1.5" marker-end="url(#arrowNavy)"/>
  <line x1="588" y1="286" x2="588" y2="352" stroke="#1C3148" stroke-width="1.5" marker-end="url(#arrowNavy)"/>
  <line x1="809" y1="286" x2="809" y2="352" stroke="#1C3148" stroke-width="1.5" marker-end="url(#arrowNavy)"/>

  <!-- ── ROW 3: L2 boxes ── -->

  <!-- Box 1 -->
  <rect x="62" y="352" width="196" height="70" rx="6" fill="url(#l2Grad)" filter="url(#shadow)"/>
  <text x="160" y="371" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="8" font-weight="700" fill="#718096" text-anchor="middle" letter-spacing="0.8">SECOND-ORDER IMPACT</text>
  <text x="160" y="388" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle">Expediting Costs Spike</text>
  <text x="160" y="404" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="8.5" fill="#718096" text-anchor="middle">Air-freight premium invoked;</text>
  <text x="160" y="416" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="8.5" fill="#718096" text-anchor="middle">fast-track vendor surcharge</text>

  <!-- Box 2 -->
  <rect x="276" y="352" width="196" height="70" rx="6" fill="url(#l2Grad)" filter="url(#shadow)"/>
  <text x="374" y="371" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="8" font-weight="700" fill="#718096" text-anchor="middle" letter-spacing="0.8">SECOND-ORDER IMPACT</text>
  <text x="374" y="388" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle">Delivery Slips 6 Weeks</text>
  <text x="374" y="404" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="8.5" fill="#718096" text-anchor="middle">COD milestone at risk;</text>
  <text x="374" y="416" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="8.5" fill="#718096" text-anchor="middle">penalty clause exposure</text>

  <!-- Box 3 -->
  <rect x="490" y="352" width="196" height="70" rx="6" fill="url(#l2Grad)" filter="url(#shadow)"/>
  <text x="588" y="371" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="8" font-weight="700" fill="#718096" text-anchor="middle" letter-spacing="0.8">SECOND-ORDER IMPACT</text>
  <text x="588" y="388" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle">Subcontractor Claims Filed</text>
  <text x="588" y="404" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="8.5" fill="#718096" text-anchor="middle">Idle-time claim lodged;</text>
  <text x="588" y="416" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="8.5" fill="#718096" text-anchor="middle">avg. resolution: 14.4 months</text>

  <!-- Box 4 -->
  <rect x="704" y="352" width="210" height="70" rx="6" fill="url(#l2Grad)" filter="url(#shadow)"/>
  <text x="809" y="371" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="8" font-weight="700" fill="#718096" text-anchor="middle" letter-spacing="0.8">SECOND-ORDER IMPACT</text>
  <text x="809" y="388" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle">Contingency Drawn Early</text>
  <text x="809" y="404" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="8.5" fill="#718096" text-anchor="middle">Risk buffer consumed in month 4</text>
  <text x="809" y="416" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="8.5" fill="#718096" text-anchor="middle">of a 24-month programme</text>

  <!-- ── Bottom callout banner ── -->
  <rect x="62" y="444" width="856" height="52" rx="6" fill="#0D1B2A" filter="url(#shadow)"/>
  <rect x="62" y="444" width="856" height="3" rx="3" fill="#E8A020"/>
  <text x="490" y="466" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="11.5" font-weight="700" fill="#E8A020" text-anchor="middle">ONE STALLED DECISION · FOUR FIRST-ORDER DELAYS · FOUR SECOND-ORDER IMPACTS</text>
  <text x="490" y="485" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="9.5" fill="#A0AEC0" text-anchor="middle">12 days of latency on a $500M project = est. $547,944 direct burn + unquantified cascade cost</text>

  <!-- ── Legend ── -->
  <rect x="62" y="510" width="11" height="11" rx="2" fill="#C0392B"/>
  <text x="80" y="520" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="9" fill="#718096">Trigger event</text>
  <rect x="180" y="510" width="11" height="11" rx="2" fill="#E8A020"/>
  <text x="198" y="520" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="9" fill="#718096">First-order delay</text>
  <rect x="320" y="510" width="11" height="11" rx="2" fill="#1C3148"/>
  <text x="338" y="520" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="9" fill="#718096">Second-order impact</text>
  <text x="918" y="520" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="8" fill="#4A5568" text-anchor="end">Deltek · Arcadis · Agile Innovation Group · Pathsetter AI 2026</text>
</svg>
